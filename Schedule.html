<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Schedule</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
      line-height: 1.4;
    }

    h1 {
      margin-bottom: 1rem;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      max-width: 760px;
    }

    th,
    td {
      border: 1px solid #ccc;
      padding: 0.6rem 0.75rem;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f3f3f3;
    }

    .date-col {
      width: 180px;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <main>
    <h1>Schedule</h1>

    <table aria-label="Schedule">
      <thead>
        <tr>
          <th class="date-col">Dates</th>
          <th>Plan</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="date-col">5 - 20 May</td>
          <td>Fra Javea</td>
        </tr>
        <tr>
          <td class="date-col">25 - 31 May</td>
          <td>Luca Prague</td>
        </tr>
        <tr>
          <td class="date-col">6 - 14 Maybe</td>
          <td>Maybe Fra Maia Javea, depends on Maia exams calendar</td>
        </tr>
        <tr>
          <td class="date-col">20 - August</td>
          <td>Maybe Luca Javea, depends on Dante final exam exact date</td>
        </tr>
        <tr>
          <td class="date-col">August</td>
          <td>Family vacation</td>
        </tr>
      </tbody>
    </table>
  </main>
</body>
</html>
